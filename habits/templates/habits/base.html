{% load static %}
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>SalutUp</title>
    
<link rel="stylesheet" href="{% static 'habits/style.css' %}">
</head>

<body>

<header class="main-header">
    <a href="{% if user.is_authenticated %}{% url 'dashboard' %}{% else %}{% url 'home' %}{% endif %}" class="logo">
        <img src="{% static 'habits/icons/logo.png' %}" alt="SalutUp" class="logo-img">
    </a>

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'edit_habits' %}">Configura hàbits</a>
            <a href="{% url 'logout' %}">
    <img src="{% static 'habits/icons/logout.png' %}" class="logout-icon">
</a>
        {% else %}
            <a href="{% url 'login' %}">Inicia sessió</a>
            <a href="{% url 'register' %}">Registra't</a>
        {% endif %}
    </nav>
</header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
