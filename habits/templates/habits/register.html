{% extends 'habits/base.html' %}
{% load static %}

{% block content %}
<div class="form-container">
    <h2>Crea un compte nou</h2>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn primary">Registrar</button>
    </form>

    <p>Ja tens compte?
        <a href="{% url 'login' %}">Inicia sessió</a>
    </p>
</div>
{% endblock %}
